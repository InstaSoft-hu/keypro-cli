# Publikalas az npm-re GitHub Release-re (es kezi inditasra), OIDC Trusted
# Publishing-gel: nincs token, az npm a GitHub OIDC-jevel hitelesit, es a
# provenance (verified source->package linkage) automatikus. Feltetelek:
# npmjs.com-on a @keypro/cli csomaghoz Trusted Publisher = ez a repo +
# publish.yml, `id-token: write` jog, es npm >= 11.5.1 (lentebb frissitjuk).
name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
